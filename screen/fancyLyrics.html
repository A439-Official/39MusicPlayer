<!doctype html>
<html lang="en">
    <head>
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" />
        <style>
            html,
            body {
                background-color: transparent;
                padding: 0;
                margin: 0;
                height: 100%;
                width: 100%;
                overflow: hidden;
            }

            @font-face {
                font-family: "HarmonyOS Sans";
                src: url("res:///HarmonyOS Sans.ttf") format("truetype");
                font-weight: normal;
                font-style: normal;
            }

            #screen {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                filter: drop-shadow(0px 0px 6px black) drop-shadow(0px 0px 2px black);
            }
        </style>
    </head>
    <body>
        <canvas id="screen"></canvas>
    </body>
</html>

<script src="js/fancyLyrics.js"></script>
