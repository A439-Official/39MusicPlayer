<!doctype html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="tab-list">
            <span class="tab-title active" id="tab-home" data-i18n="Home"></span>
            <span class="tab-title" id="tab-search" data-i18n="Search"></span>
            <span class="tab-title" id="tab-playlist" data-i18n="Playlist"></span>
            <span class="tab-title" id="tab-settings" data-i18n="Settings"></span>
        </div>
        <div class="tab-content active" id="content-home">
            <p>Tab: Home</p>
        </div>
        <div class="tab-content" id="content-search">
            <p>Tab: Search</p>
        </div>
        <div class="tab-content" id="content-playlist">
            <p>Tab: Playlist</p>
        </div>
        <div class="tab-content" id="content-settings">
            <div class="setting-item" id="setting-language">
                <p data-i18n="Language"></p>
                <div id="language-select-custom"></div>
            </div>
            <div class="setting-item" id="setting-theme">
                <p data-i18n="Theme"></p>
                <div id="theme-select-custom"></div>
            </div>
        </div>
        <div class="footer-tabs">
            <img src="../resources/39.png" class="footer-img">
        </div>
    </body>
</html>

<script src="theme.js"></script>
