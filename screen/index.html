<!doctype html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="css/main.css" />
    </head>

    <body>
        <div class="tab-list">
            <span class="tab-title active" id="tab-home" data-i18n="Home"></span>
            <span class="tab-title" id="tab-search" data-i18n="Search"></span>
            <span class="tab-title" id="tab-playlist" data-i18n="Playlist"></span>
            <span class="tab-title" id="tab-settings" data-i18n="Settings"></span>
        </div>
        <div class="tab-content active" id="content-home">
            <p>Tab: Home</p>
        </div>
        <div class="tab-content" id="content-search">
            <input type="text" id="search-input" />
            <table id="search-results-table">
                <thead>
                    <tr>
                        <th data-i18n="Title">Title</th>
                        <th data-i18n="Artist">Artist</th>
                        <th data-i18n="Action">Action</th>
                    </tr>
                </thead>
                <tbody id="search-results-body"></tbody>
            </table>
        </div>
        <div class="tab-content" id="content-playlist">
            <p>Tab: Playlist</p>
        </div>
        <div class="tab-content" id="content-settings">
            <div class="setting-item" id="setting-language">
                <p data-i18n="Language"></p>
                <div id="language-select-custom"></div>
            </div>
            <div class="setting-item" id="setting-theme">
                <p data-i18n="Theme"></p>
                <div id="theme-select-custom"></div>
            </div>
        </div>
        <div class="tab-content" id="content-player">
            <h1>播放界面</h1>
            <p>这里是播放控制界面，可以放置播放控制、歌词显示等内容</p>
        </div>
        <div class="footer-tabs">
            <img src="../resources/39.png" class="footer-img" />
            <div class="content-box">
                <div class="content">
                    <div class="title-box">
                        <p class="song-title" id="song-title">曲名</p>
                    </div>
                    <div class="artist-box">
                        <span class="song-artist" id="song-artist">歌手</span>
                    </div>
                </div>
                <div class="seek-bar">
                    <input type="range" id="seek-bar" min="0" max="100" value="0" />
                    <span><span id="current-time">00:00</span>&nbsp;/&nbsp;<span id="total-time">00:00</span></span>
                </div>
            </div>
            <div class="buttons">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="prev-btn">
                    <polygon points="19 20 9 12 19 4 19 20"></polygon>
                    <line x1="5" y1="19" x2="5" y2="5"></line>
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="pause-btn" onclick="togglePause()">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="next-btn">
                    <polygon points="5 4 15 12 5 20 5 4"></polygon>
                    <line x1="19" y1="5" x2="19" y2="19"></line>
                </svg>
                <button id="openBtn" onclick="switchToPlayerTab()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="tab-settings">
                        <path d="M12 19V6M5 12l7-7 7 7" />
                    </svg>
                </button>
                <div class="buttons volume">
                    <svg id="volume-button" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                    <div class="volume-progress-bar">
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" />
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>

<script src="js/select.js"></script>
<script src="js/theme.js"></script>
<script src="js/i18n.js"></script>
<script src="js/musicApi.js"></script>
<script src="js/player.js"></script>
<script src="js/playlist.js"></script>
<script src="js/search.js"></script>
<script src="js/script.js"></script>
<script src="js/css.js"></script>
