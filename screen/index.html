<!doctype html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="css/main.css" />
        <meta charset="UTF-8" />
    </head>

    <body>
        <div class="tab-list">
            <span class="tab-title active" id="tab-home" data-i18n="Home"></span>
            <span class="tab-title" id="tab-search" data-i18n="Search"></span>
            <span class="tab-title" id="tab-playlist" data-i18n="Playlist"></span>
            <span class="tab-title" id="tab-settings" data-i18n="Settings"></span>
        </div>
        <div class="tab-content active" id="content-home">
            <img src="res://homelogo.png" class="home-logo" />
            <div id="update-history"></div>
        </div>
        <div class="tab-content" id="content-search">
            <input type="text" id="search-input" />
            <div id="search-results-container"></div>
        </div>
        <div class="tab-content" id="content-playlist">
            <div id="playlist-select-container" class="setting-item">
                <p data-i18n="Playlist"></p>
                <div id="playlist-selector-custom"></div>
            </div>

            <button id="create-playlist-btn" class="btn" data-i18n="Create Playlist"></button>

            <div id="playlist-empty-msg" class="empty-message" data-i18n="No songs in playlist"></div>

            <div id="playlist-list-container"></div>
        </div>
        <div class="tab-content" id="content-settings">
            <div class="setting-item" id="setting-language">
                <p data-i18n="Language"></p>
                <div id="language-select-custom"></div>
            </div>
            <div class="setting-item" id="setting-theme">
                <p data-i18n="Theme"></p>
                <div id="theme-select-custom"></div>
            </div>
            <div class="setting-item" id="setting-update">
                <p data-i18n="Check for Updates"></p>
                <button id="check-update-btn" class="btn">Check</button>
            </div>
            <div class="setting-item" id="setting-update">
                <p data-i18n="Visualizer"></p>
                <div id="visualizer-toggle-container"></div>
            </div>
        </div>
        <div class="tab-content" id="content-player">
            <div class="player-title">
                <h1 class="player-title-song data-title" id="song-title2"></h1>
                <h3 class="player-title-artist data-artist" id="song-artist2"></h3>
            </div>
            <div class="player-container">
                <div class="player-container-lyrics" id="lyrics-container">
                    <div class="lyrics-lines" id="lyrics-lines"></div>
                </div>
                <img class="player-container-img data-cover" />
            </div>
            <div class="audio-visualizer">
                <canvas id="visualizer"></canvas>
            </div>
        </div>
        <div class="footer-tabs">
            <div class="footer-img data-cover"></div>
            <div class="event-overlay" onclick="switchToPlayerTab()">
                <div class="title-box">
                    <p class="data-title song-title" id="song-title"></p>
                </div>
                <div class="artist-box">
                    <span class="data-artist song-artist" id="song-artist"></span>
                </div>
                <p class="time-box"><span id="current-time">00:00</span>&nbsp;/&nbsp;<span id="total-time">00:00</span></p>
            </div>
            <div class="buttons">
                <svg class="btn" id="prev-btn" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="m17 18-6-6 6-6" />
                    <path d="M7 6v12" />
                </svg>
                <svg class="btn" id="pause-btn" onclick="togglePause(this)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z" />
                </svg>
                <svg class="btn" id="next-btn" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="m7 18 6-6-6-6" />
                    <path d="M17 6v12" />
                </svg>
            </div>
            <div class="volume">
                <svg class="btn" id="volume-button" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298z" />
                    <path d="M16 9a5 5 0 0 1 0 6" />
                    <path d="M19.364 18.364a9 9 0 0 0 0-12.728" />
                </svg>
                <div class="volume-progress-bar">
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" />
                </div>
            </div>
            <div class="seek-bar" id="seek-bar"></div>
        </div>
        <div class="modal-overlay">
            <div class="modal-content"></div>
        </div>
    </body>
</html>

<script src="js/components.js"></script>
<script src="js/theme.js"></script>
<script src="js/i18n.js"></script>
<script src="js/musicApi.js"></script>
<script src="js/player.js"></script>
<script src="js/volume.js"></script>
<script src="js/playlist.js"></script>
<script src="js/search.js"></script>
<script src="js/script.js"></script>
<script src="js/css.js"></script>
<script src="js/visualizer.js"></script>
<script src="js/options.js"></script>
<script src="js/home.js"></script>
<script src="js/ui.js"></script>
